# MetaPilot Queue Worker — Supervisor Config
# 
# DEPLOY: sudo cp supervisor-worker.conf /etc/supervisor/conf.d/metapilot-worker.conf
#         sudo supervisorctl reread && sudo supervisorctl update
#         sudo supervisorctl start metapilot-worker:*

[program:metapilot-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/metapilot/artisan queue:work redis --queue=cdn,emails,gsc,predictive,default --sleep=3 --tries=3 --max-time=3600
directory=/var/www/metapilot
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/metapilot/storage/logs/worker.log
stopwaitsecs=3600
